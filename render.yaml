services:
  - type: web
    name: skin-disease-detector-api
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: PORT
        value: "5000"
